---
- name: Install pip and python kubernetes library
  apt:
    name:
      - python3-pip
      - python3-kubernetes
    state: present
    update_cache: yes
  when: inventory_hostname == 'k8s-master'

- name: Create namespace for application
  kubernetes.core.k8s:
    name: hello-world-app
    api_version: v1
    kind: Namespace
    state: present
  when: inventory_hostname == 'k8s-master'

- name: Apply RBAC manifests (Auth & Authz)
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', item) | from_yaml }}"
  loop:
    - sa.yaml.j2
    - role.yaml.j2
    - rolebinding.yaml.j2
  when: inventory_hostname == 'k8s-master'

- name: Deploy Hello World application and service
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', item) | from_yaml }}"
  loop:
    - deployment.yaml.j2
    - service.yaml.j2
  when: inventory_hostname == 'k8s-master'
