- name: Remove broken Angie repository line from main sources.list
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list
    regexp: 'https://angie\.software'
    state: absent

- name: Remove broken legacy files from sources.list.d
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/angie.list
    - /etc/apt/sources.list.d/angie-software.list

- name: Ensure HTTPS transport and certificates are installed
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
    state: present

- name: Download official Angie GPG key directly to trusted keyring
  ansible.builtin.get_url:
    url: https://angie.software/keys/angie-signing.gpg
    dest: /etc/apt/trusted.gpg.d/angie-signing.gpg
    mode: '0644'

- name: Add CORRECT Angie repository file with correct path structure
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/angie.list
    content: |
      deb https://download.angie.software/angie/{{ ansible_distribution | lower }}/{{ ansible_distribution_version }} {{ ansible_distribution_release }} main
    mode: '0644'

- name: Force update apt cache
  ansible.builtin.apt:
    update_cache: yes

- name: Install Angie web server
  ansible.builtin.apt:
    name: angie
    state: present

- name: Ensure Angie is running and enabled
  ansible.builtin.systemd:
    name: angie
    state: started
    enabled: yes
