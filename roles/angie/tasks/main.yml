- name: Check for APT locks and remove them if found
  command: lsof /var/lib/dpkg/lock /var/cache/apt/archives/lock
  register: apt_locks
  ignore_errors: true
  changed_when: false

- name: Remove APT locks if present
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/lib/dpkg/lock
    - /var/cache/apt/archives/lock
  when: apt_locks.rc == 0
  ignore_errors: true
